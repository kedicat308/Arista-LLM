!
hostname core1
!
no aaa root
!
username admin privilege 15 role network-admin secret 0 admin
!
spanning-tree mode none
!
interface Ethernet1
   description up-to-edge1
   no switchport
   ip address 10.0.13.1/30
!
interface Ethernet2
   description peer-core2
   no switchport
   ip address 10.0.12.1/30
!
interface Ethernet3
   description down-to-csw1
   no switchport
   ip address 10.1.0.1/24
!
interface Loopback0
   ip address 3.3.3.3/32
!
interface Management0
   ip address dhcp
!
ip routing
!
router ospf 1
   router-id 3.3.3.3
   network 10.0.12.0/30 area 0.0.0.0
   network 10.0.13.0/30 area 0.0.0.0
   network 10.1.0.0/24 area 0.0.0.0
   network 3.3.3.3/32 area 0.0.0.0
!
router bgp 65001
   router-id 3.3.3.3
   neighbor 4.4.4.4 remote-as 65001
   neighbor 4.4.4.4 update-source Loopback0
   neighbor 4.4.4.4 next-hop-self
   network 10.1.0.0/24
!
management api http-commands
   no shutdown
!
username admin privilege 15 role network-admin secret 0 admin
!
management api gnmi
   transport grpc default
   provider eos-native
!
end
