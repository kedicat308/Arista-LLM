!
hostname edge2
!
no aaa root
!
username admin privilege 15 role network-admin secret 0 admin
!
spanning-tree mode none
!
interface Ethernet1
   description uplink-to-inet
   no switchport
   ip address 192.168.100.6/30
!
interface Ethernet2
   description down-to-core2
   no switchport
   ip address 10.0.24.2/30
!
interface Management0
   ip address dhcp
!
ip routing
!
ip route 0.0.0.0/0 192.168.100.5
!
router ospf 1
   router-id 2.2.2.2
   network 10.0.24.0/30 area 0.0.0.0
   default-information originate
!
router bgp 65001
   router-id 2.2.2.2
   neighbor 192.168.100.5 remote-as 65100
   network 10.1.0.0/24
   network 10.2.0.0/24
!
management api http-commands
   no shutdown
!
username admin privilege 15 role network-admin secret 0 admin
!
management api gnmi
   transport grpc default
   provider eos-native
!
end
