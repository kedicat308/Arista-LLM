!
hostname core2
!
no aaa root
!
username admin privilege 15 role network-admin secret 0 admin
!
spanning-tree mode none
!
interface Ethernet1
   description up-to-edge2
   no switchport
   ip address 10.0.24.1/30
!
interface Ethernet2
   description peer-core1
   no switchport
   ip address 10.0.12.2/30
!
interface Ethernet3
   description down-to-csw2
   no switchport
   ip address 10.2.0.1/24
!
interface Loopback0
   ip address 4.4.4.4/32
!
interface Management0
   ip address dhcp
!
ip routing
!
router ospf 1
   router-id 4.4.4.4
   network 10.0.12.0/30 area 0.0.0.0
   network 10.0.24.0/30 area 0.0.0.0
   network 10.2.0.0/24 area 0.0.0.0
   network 4.4.4.4/32 area 0.0.0.0
!
router bgp 65001
   router-id 4.4.4.4
   neighbor 3.3.3.3 remote-as 65001
   neighbor 3.3.3.3 update-source Loopback0
   neighbor 3.3.3.3 next-hop-self
   network 10.2.0.0/24
!
management api http-commands
   no shutdown
!
username admin privilege 15 role network-admin secret 0 admin
!
management api gnmi
   transport grpc default
   provider eos-native
!
end
